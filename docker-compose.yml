version: '3.8'

services:
  # Векторная БД для семантического поиска
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: odl-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q \"200 OK\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Кэш для горячего старта
  redis:
    image: redis:7-alpine
    container_name: odl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Observability (опционально — можно отключить через profile)
  langfuse:
    image: langfuse/langfuse:2
    container_name: odl-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=${SALT:?Set SALT in .env}
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # PostgreSQL для LangFuse (метаданные, трассировка)
  langfuse-db:
    image: postgres:16-alpine
    container_name: odl-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # PostgreSQL для метаданных и иерархического рубрикатора
  metadata-db:
    image: postgres:16-alpine
    container_name: odl-metadata-db
    environment:
      - POSTGRES_USER=odl
      - POSTGRES_PASSWORD=odl
      - POSTGRES_DB=odl_metadata
    volumes:
      - metadata_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odl"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Основное приложение (слой официальных данных)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odl-app
    ports:
      - "8000:8000"  # MCP/HTTP API
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - DATABASE_URL=postgresql://odl:odl@metadata-db:5432/odl_metadata
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_CLEAR_ON_START=${LOG_CLEAR_ON_START:-false}
      - LOG_FILE=${LOG_FILE:-data/traces.log}
    volumes:
      - app_data:/app/data  # Логи и прочие файлы
      - ./adapters:/app/adapters:ro  # Read-only: переопределяет COPY из образа. Для разработки адаптеров используйте docker-compose.override.yml без :ro
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started
      metadata-db:
        condition: service_healthy
      # langfuse intentionally omitted — app handles unavailability gracefully
      # redis intentionally uses service_started — app handles unavailability gracefully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  langfuse_db_data:
  metadata_db_data:
  app_data:
