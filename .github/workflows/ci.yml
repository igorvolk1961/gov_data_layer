name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "plans/**"
      - "examples/**"
      - "task/**"
      - ".gitignore"
      - ".env.example"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".kilocode"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "plans/**"
      - "examples/**"
      - "task/**"
      - ".gitignore"
      - ".env.example"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".kilocode"

# Cancel in-progress runs for the same branch (PR or push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check core/ adapters/ tests/
          ruff format --check core/ adapters/ tests/

      - name: Type check with mypy
        run: mypy core/ adapters/

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # Service containers for integration tests
    services:
      qdrant:
        image: qdrant/qdrant:v1.11.3
        ports:
          - 6333:6333
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      metadata-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: odl
          POSTGRES_PASSWORD: odl  # pragma: allowlist secret
          POSTGRES_DB: odl_metadata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DATABASE_URL: postgresql://odl:odl@localhost:5432/odl_metadata  # pragma: allowlist secret
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=core --cov=adapters \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
