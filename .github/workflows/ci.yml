name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "plans/**"
      - "examples/**"
      - "task/**"
      - ".gitignore"
      - ".env.example"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".kilorules"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "plans/**"
      - "examples/**"
      - "task/**"
      - ".gitignore"
      - ".env.example"
      - ".pre-commit-config.yaml"
      - ".secrets.baseline"
      - ".kilorules"

# Cancel in-progress runs for the same branch (PR or push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check core/ adapters/ tests/
          ruff format --check core/ adapters/ tests/

      - name: Type check with mypy
        run: mypy core/ adapters/

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    # Service containers for integration tests
    services:
      qdrant:
        image: qdrant/qdrant:v1.11.3
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && head -1 <&3 | grep -q \"200 OK\"'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      metadata-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: odl
          POSTGRES_PASSWORD: odl  # pragma: allowlist secret
          POSTGRES_DB: odl_metadata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Tesseract OCR engine, poppler and PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-rus poppler-utils postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply database migrations
        env:
          PGPASSWORD: odl  # pragma: allowlist secret
        run: |
          for f in \
            core/persistence/migrations/v001/000_create_data_source.sql \
            core/persistence/migrations/v001/001_create_reference_tables.sql \
            core/persistence/migrations/v001/002_create_document_tables.sql \
            core/persistence/migrations/v001/003_create_document_relations.sql \
            core/persistence/migrations/v001/004_create_change_tracking.sql \
            core/persistence/migrations/v001/005_create_rubric_table.sql \
            core/persistence/migrations/v001/006_create_document_rubric.sql \
            core/persistence/migrations/v001/007_rename_external_id_to_publish_id.sql \
            core/persistence/migrations/v001/008_rename_document_columns.sql; do
            echo "Applying $f..."
            psql -h localhost -p 5432 -U odl -d odl_metadata -f "$f"
          done

      - name: Run tests with coverage
        env:
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DATABASE_URL: postgresql://odl:odl@localhost:5432/odl_metadata  # pragma: allowlist secret
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "not slow" \
            --cov=core --cov=adapters \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
